spring:
  datasource:
    url: ${PEMBAYARAN_DB_URL}
    username: ${PEMBAYARAN_DB_USERNAME}
    password: ${PEMBAYARAN_DB_PASSWORD}

    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect